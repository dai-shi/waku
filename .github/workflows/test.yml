name: Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      react_version:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      react_version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    name: Test on (Node ${{ matrix.version }})
    strategy:
      fail-fast: false
      matrix:
        version: [26.0.0, 24.0.0, 22.15.0]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || '' }}
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.version }}
          cache: ${{ !inputs.react_version && 'pnpm' || '' }}
      - if: ${{ inputs.react_version }}
        env:
          REACT_VERSION: ${{ inputs.react_version }}
        run: |
          yq eval -i '.overrides |= (.react = strenv(REACT_VERSION) | .["react-dom"] = strenv(REACT_VERSION) | .["react-server-dom-webpack"] = strenv(REACT_VERSION))' pnpm-workspace.yaml
          pnpm install --no-frozen-lockfile
      - run: pnpm install
      - run: pnpm run compile
      - run: pnpm test:unit
        env:
          VITE_EXPERIMENTAL_WAKU_ROUTER: true
