packages:
  - 'packages/*'
  - 'templates/*'
  - 'e2e/fixtures/*'
  # package.json in dist is generated by `waku build`
  - '!**/dist'
preferWorkspacePackages: true
saveWorkspaceProtocol: true
linkWorkspacePackages: true
minimumReleaseAgeExclude:
  - '@vitejs/plugin-rsc'
  - 'react'
  - 'react-dom'
  - 'react-server-dom-webpack'
  - 'scheduler'
  - 'waku-jotai'
allowBuilds:
  '@swc/core': false
  esbuild: false
  sharp: false
  unrs-resolver: false
  workerd: false
